{% extends 'base.html' %}

{% block title %}صناع المحتوى - ريكس{% endblock %}

{% block content %}
    <!-- PAGE HEADER -->
    <div class="container">
        <div class="page-header">
            <h1>
                <i class="fas fa-video"></i>
                صناع المحتوى
            </h1>
            <p>اضغط على البطاقة لمعرفة المزيد</p>
        </div>

        <!-- FILTERS -->
        <div class="filters">
            <span class="filter-label"><i class="fas fa-filter"></i> المنصة:</span>
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="snapchat"><i class="fab fa-snapchat-ghost"></i> سناب شات</button>
            <button class="filter-btn" data-filter="tiktok"><i class="fab fa-tiktok"></i> تيك توك</button>
            <button class="filter-btn" data-filter="instagram"><i class="fab fa-instagram"></i> انستقرام</button>
            <button class="filter-btn" data-filter="youtube"><i class="fab fa-youtube"></i> يوتيوب</button>
        </div>

        <!-- VIDEO GRID -->
        <div class="models-grid" id="creatorsGrid"></div>

        <!-- NO RESULTS -->
        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-search"></i>
            <p>لا توجد نتائج مطابقة</p>
        </div>
    </div>

    <!-- ===== VIDEO MODAL - تصميم تيك توك ===== -->
    <div class="video-modal" id="videoModal">
        <!-- Close Button -->
        <button class="modal-close-btn" id="closeModalBtn">
            <i class="fas fa-times"></i>
        </button>
        
        <!-- Navigation Buttons - سهم لفوق وسهم لتحت -->
        <div class="nav-buttons-vertical">
            <button class="modal-nav-btn up" id="prevBtn">
                <i class="fas fa-chevron-up"></i>
            </button>
            <button class="modal-nav-btn down" id="nextBtn">
                <i class="fas fa-chevron-down"></i>
            </button>
        </div>

        <!-- Container -->
        <div class="tiktok-container" id="tiktokContainer">
            <!-- الفيديو (بدون كونترولز) -->
            <div class="video-wrapper" id="videoWrapper">
                <video id="modalVideoPlayer" class="modal-video-player" loop playsinline>
                    <source src="" type="video/mp4">
                </video>
            </div>
            
            <!-- المحتوى المتداخل -->
            <div class="video-overlay-content">
                <!-- صورة الحساب الدائرية -->
                <div class="profile-circle" id="modalProfileCircle">
                    <img src="" alt="profile" id="profileImage" style="display: none;">
                    <i class="fas fa-user-circle" id="profileIcon"></i>
                </div>
                
                <!-- اسم الحساب -->
                <div class="username-container">
                    <span class="username" id="modalAccountName">@username</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== البيانات ====================
        const creatorsData = [
            {% for creator in page_obj.object_list %}
            {
                id: {{ creator.id }},
                userId: {% if creator.user_id %}{{ creator.user_id }}{% else %}null{% endif %},
                name: "{{ creator.name|escapejs }}",
                platform: "{{ creator.platform|escapejs }}",
                image: "{{ creator.image_url }}",
                video: "{{ creator.video_url }}"
            },
            {% endfor %}
        ];

        // ==================== المتغيرات العامة ====================
        let currentFilter = 'all';
        let currentVisibleCreators = [];
        let currentIndex = 0;
        
        // عناصر المودال
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('modalVideoPlayer');
        const videoWrapper = document.getElementById('videoWrapper');
        const accountName = document.getElementById('modalAccountName');
        const profileCircle = document.getElementById('modalProfileCircle');
        const profileImage = document.getElementById('profileImage');
        const profileIcon = document.getElementById('profileIcon');
        const upBtn = document.getElementById('prevBtn');
        const downBtn = document.getElementById('nextBtn');
        const closeBtn = document.getElementById('closeModalBtn');

        // متغيرات السحب
        let touchStartY = 0;
        let touchEndY = 0;
        let isSwiping = false;
        let isAnimating = false;

        // ==================== دالة عرض البطاقات ====================
        function renderCreators(filter = 'all') {
            const grid = document.getElementById('creatorsGrid');
            const noResults = document.getElementById('noResults');
            
            let filtered = creatorsData;
            if (filter !== 'all') {
                filtered = creatorsData.filter(creator => creator.platform.toLowerCase() === filter);
            }

            currentVisibleCreators = filtered;

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            
            grid.innerHTML = filtered.map((creator, index) => {
                let mediaContent = '';
                let clickAction = '';

                if (creator.video) {
                    mediaContent = `<video class="model-media" muted loop playsinline poster="${creator.image || ''}"></video>`;
                    clickAction = `onclick="openVideoModal(${index})"`;
                } else if (creator.image) {
                    mediaContent = `<img src="${creator.image}" class="model-media" alt="${creator.name}" loading="lazy">`;
                } else {
                    mediaContent = `<div class="model-media" style="background:linear-gradient(135deg,#333,#000); display:flex; align-items:center; justify-content:center; font-size:2rem;">📷</div>`;
                }

                const link = creator.userId 
                    ? `/provider/${creator.userId}/` 
                    : `/request-service/?service=content-creators&id=${creator.id}`;

                if (!creator.video) {
                    clickAction = `onclick="window.location.href='${link}'"`;
                }

                return `
                    <div class="model-card" ${clickAction} data-video-src="${creator.video || ''}" data-creator-id="${creator.userId || ''}" data-creator-name="${creator.name}" data-creator-image="${creator.image || ''}">
                        ${mediaContent}
                        <div class="overlay-gradient"></div>
                        <div class="video-badge">
                            <i class="fas fa-play-circle"></i> 
                            ${creator.video ? 'فيديو' : 'صورة'}
                        </div>
                        <div class="play-icon">
                            <i class="fas fa-play-circle"></i>
                        </div>
                    </div>
                `;
            }).join('');

            // تشغيل الفيديوهات
            document.querySelectorAll('.model-card').forEach(card => {
                const videoSrc = card.dataset.videoSrc;
                if (videoSrc) {
                    const video = card.querySelector('video');
                    if (video) {
                        const observer = new IntersectionObserver((entries) => {
                            entries.forEach(entry => {
                                if (entry.isIntersecting) {
                                    if (!video.src) {
                                        video.src = videoSrc;
                                        video.load();
                                    }
                                    video.play().catch(e => {});
                                } else {
                                    video.pause();
                                }
                            });
                        }, { threshold: 0.3 });

                        observer.observe(video);
                    }
                }
            });
        }

        // ==================== دوال المودال ====================
        window.openVideoModal = function(index) {
            currentIndex = index;
            const creator = currentVisibleCreators[index];
            
            if (!creator || !creator.video) return;

            video.src = creator.video;
            accountName.textContent = '@' + creator.name.replace(/\s+/g, '_').toLowerCase();
            
            if (creator.image) {
                profileImage.src = creator.image;
                profileImage.style.display = 'block';
                profileIcon.style.display = 'none';
            } else {
                profileImage.style.display = 'none';
                profileIcon.style.display = 'flex';
            }
            
            const profileUrl = creator.userId 
                ? `/provider/${creator.userId}/` 
                : `/request-service/?service=content-creators&id=${creator.id}`;
            
            profileCircle.onclick = (e) => {
                e.stopPropagation();
                window.open(profileUrl, '_blank');
            };

            video.play().catch(e => console.log('تأخير تشغيل الفيديو'));
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            updateButtons();
            
            videoWrapper.style.transform = 'translateY(0)';
            videoWrapper.style.opacity = '1';
            videoWrapper.style.transition = 'none';
        };

        function closeModal() {
            video.pause();
            video.currentTime = 0;
            video.src = "";
            
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function nextVideo() {
            if (currentIndex < currentVisibleCreators.length - 1) {
                videoWrapper.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                videoWrapper.style.transform = 'translateY(-100%)';
                videoWrapper.style.opacity = '0';
                
                setTimeout(() => {
                    openVideoModal(currentIndex + 1);
                }, 300);
            }
        }

        function prevVideo() {
            if (currentIndex > 0) {
                videoWrapper.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                videoWrapper.style.transform = 'translateY(100%)';
                videoWrapper.style.opacity = '0';
                
                setTimeout(() => {
                    openVideoModal(currentIndex - 1);
                }, 300);
            }
        }

        function updateButtons() {
            if (currentVisibleCreators.length <= 1) {
                upBtn.style.display = 'none';
                downBtn.style.display = 'none';
                return;
            }

            if (window.innerWidth > 768) {
                upBtn.style.display = 'flex';
                downBtn.style.display = 'flex';
            }

            if (currentIndex === 0) {
                upBtn.classList.add('disabled');
            } else {
                upBtn.classList.remove('disabled');
            }

            if (currentIndex === currentVisibleCreators.length - 1) {
                downBtn.classList.add('disabled');
            } else {
                downBtn.classList.remove('disabled');
            }
        }

        // ==================== أحداث السحب ====================
        modal.addEventListener('touchstart', (e) => {
            if (isAnimating) return;
            touchStartY = e.changedTouches[0].screenY;
            isSwiping = true;
            videoWrapper.style.transition = 'none';
        }, { passive: true });

        modal.addEventListener('touchmove', (e) => {
            if (!isSwiping || isAnimating) return;
            const diffY = e.changedTouches[0].screenY - touchStartY;
            videoWrapper.style.transform = `translateY(${diffY}px)`;
            videoWrapper.style.opacity = 1 - Math.min(Math.abs(diffY) / 500, 0.5);
            e.preventDefault();
        }, { passive: false });

        modal.addEventListener('touchend', (e) => {
            if (!isSwiping || isAnimating) return;
            
            touchEndY = e.changedTouches[0].screenY;
            const diffY = touchEndY - touchStartY;
            const swipeThreshold = 80;

            if (Math.abs(diffY) > swipeThreshold) {
                isAnimating = true;
                
                if (diffY > 0) {
                    videoWrapper.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                    videoWrapper.style.transform = 'translateY(100%)';
                    videoWrapper.style.opacity = '0';
                    
                    setTimeout(() => {
                        if (currentIndex > 0) {
                            openVideoModal(currentIndex - 1);
                        } else {
                            videoWrapper.style.transition = 'transform 0.2s ease';
                            videoWrapper.style.transform = 'translateY(0)';
                            videoWrapper.style.opacity = '1';
                        }
                        isAnimating = false;
                    }, 300);
                } else {
                    videoWrapper.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                    videoWrapper.style.transform = 'translateY(-100%)';
                    videoWrapper.style.opacity = '0';
                    
                    setTimeout(() => {
                        if (currentIndex < currentVisibleCreators.length - 1) {
                            openVideoModal(currentIndex + 1);
                        } else {
                            videoWrapper.style.transition = 'transform 0.2s ease';
                            videoWrapper.style.transform = 'translateY(0)';
                            videoWrapper.style.opacity = '1';
                        }
                        isAnimating = false;
                    }, 300);
                }
            } else {
                videoWrapper.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                videoWrapper.style.transform = 'translateY(0)';
                videoWrapper.style.opacity = '1';
            }
            
            isSwiping = false;
        }, { passive: true });

        // ==================== أحداث الكيبورد ====================
        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowUp') { e.preventDefault(); prevVideo(); }
            if (e.key === 'ArrowDown') { e.preventDefault(); nextVideo(); }
        });

        // ==================== ربط الأزرار ====================
        closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeModal(); });
        upBtn.addEventListener('click', (e) => { e.stopPropagation(); prevVideo(); });
        downBtn.addEventListener('click', (e) => { e.stopPropagation(); nextVideo(); });
        
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        video.addEventListener('click', (e) => { e.stopPropagation(); });

        window.addEventListener('resize', function() {
            if (window.innerWidth <= 768) {
                upBtn.style.display = 'none';
                downBtn.style.display = 'none';
            } else if (currentVisibleCreators.length > 1) {
                upBtn.style.display = 'flex';
                downBtn.style.display = 'flex';
            }
        });

        // ==================== الفلاتر ====================
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderCreators(this.dataset.filter);
            });
        });

        // ==================== التحميل ====================
        renderCreators();
    </script>
{% endblock %}

{% block extra_css %}
<style>
    /* ===== PAGE HEADER ===== */
    .page-header { 
        margin-top: 6rem; 
        padding: 1.5rem 0; 
        border-bottom: 2px solid rgba(255,189,89,0.2);
        text-align: center;
    }

    .page-header h1 { 
        color: var(--primary); 
        margin-bottom: 0.3rem;
        font-size: 2.5rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
    }

    .page-header h1 i {
        font-size: 2rem;
    }

    .page-header p { 
        color: var(--text-muted);
        font-size: 1.1rem;
    }

    /* ===== FILTERS ===== */
    .filters { 
        background: linear-gradient(145deg, #2a2a2a, #222);
        padding: 1.5rem; 
        border-radius: 40px; 
        margin: 2rem 0; 
        display: flex; 
        gap: 1rem; 
        flex-wrap: wrap; 
        align-items: center;
        border: 1px solid rgba(255,189,89,0.2);
        box-shadow: var(--shadow);
    }

    .filter-label { 
        color: #fff; 
        font-weight: 600; 
        margin-left: 1rem;
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .filter-label i {
        color: var(--primary);
    }

    .filter-btn { 
        padding: 0.6rem 1.8rem; 
        border: 2px solid rgba(255,189,89,0.3); 
        background-color: transparent; 
        color: #fff; 
        border-radius: 30px; 
        cursor: pointer; 
        transition: all 0.3s; 
        font-family: 'Cairo'; 
        font-weight: 600;
        font-size: 0.95rem;
    }

    .filter-btn:hover, 
    .filter-btn.active { 
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: #000; 
        border-color: transparent;
        transform: translateY(-2px);
    }

    /* ===== VIDEO GRID ===== */
    .models-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
        gap: 1.5rem; 
        margin: 2.5rem 0; 
    }

    .model-card {
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        aspect-ratio: 9/16;
        background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
        cursor: pointer;
        box-shadow: var(--shadow);
        transition: transform 0.3s;
        border: 2px solid transparent;
        animation: scaleIn 0.4s ease-out backwards;
        will-change: transform;
    }

    .model-card:nth-child(1) { animation-delay: 0.05s; }
    .model-card:nth-child(2) { animation-delay: 0.1s; }
    .model-card:nth-child(3) { animation-delay: 0.15s; }
    .model-card:nth-child(4) { animation-delay: 0.2s; }
    .model-card:nth-child(5) { animation-delay: 0.25s; }
    .model-card:nth-child(6) { animation-delay: 0.3s; }

    .model-card:hover {
        transform: translateY(-8px);
        border-color: var(--primary);
    }

    .model-media {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s;
        will-change: transform;
    }

    .model-card:hover .model-media {
        transform: scale(1.08);
    }

    .overlay-gradient {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40%;
        background: linear-gradient(to top, 
            rgba(0,0,0,0.9) 0%,
            rgba(0,0,0,0.4) 50%,
            transparent 100%);
        pointer-events: none;
        opacity: 0.8;
        transition: opacity 0.3s;
    }

    .video-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255,189,89,0.9);
        color: #000;
        padding: 0.3rem 0.8rem;
        border-radius: 20px 5px 20px 5px;
        font-size: 0.75rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .model-card:hover .video-badge {
        opacity: 1;
    }

    .play-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 2.5rem;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 10;
        text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .model-card:hover .play-icon {
        opacity: 1;
    }

    .no-results {
        text-align: center;
        padding: 4rem 2rem;
        background: linear-gradient(145deg, #2a2a2a, #222);
        border-radius: 25px;
        border: 2px dashed rgba(255,189,89,0.3);
        margin: 2.5rem 0;
    }

    .no-results i {
        font-size: 3.5rem;
        color: var(--primary);
        margin-bottom: 1rem;
        opacity: 0.7;
    }

    .no-results p {
        color: var(--text-muted);
        font-size: 1.2rem;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* ===== ستايل المودال ===== */
    .video-modal {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #000;
        z-index: 2000;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease;
    }

    .video-modal.active { display: flex; }

    .tiktok-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        overflow: hidden;
    }

    .video-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        will-change: transform, opacity;
    }

    .modal-video-player {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
    }
    
    .modal-video-player::-webkit-media-controls {
        display: none !important;
    }

    .video-overlay-content {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 10;
    }

    .nav-buttons-vertical {
        position: absolute;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 100;
        pointer-events: auto;
    }

    .modal-nav-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        border: 2px solid rgba(255,189,89,0.3);
        color: var(--primary);
        font-size: 1.3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .modal-nav-btn:hover:not(.disabled) {
        background: var(--primary);

        transform: scale(1.1);
    }

    .modal-nav-btn.disabled {
        opacity: 0.3;
        cursor: not-allowed;
        pointer-events: none;
    }

    .profile-circle {
        position: absolute;
        top: calc(60% + 95px);
        right: 20px;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid var(--primary);
        cursor: pointer;
        background: #2d2d2d;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 20px rgba(255,189,89,0.5);
        pointer-events: auto;
        z-index: 20;
        transform: translateY(-50%);
    }

    .profile-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .profile-circle i {
        font-size: 3rem;
        color: #fff;
    }

    .username-container {
        position: absolute;
        top: calc(60% + 95px + 80px);
        right: 20px;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        padding: 8px 16px;
        border-radius: 40px;
        border: 1px solid rgba(255,189,89,0.3);
        pointer-events: auto;
        z-index: 20;
        transform: translateY(-50%);
    }

    .username {
        color: #fff;
        font-weight: 600;
        font-size: 1rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 150px;
    }

    .modal-close-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #fff;
        font-size: 1.3rem;
        cursor: pointer;
        z-index: 100;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        border-radius: 50%;
        border: 2px solid rgba(255,189,89,0.3);
        transition: all 0.3s ease;
        pointer-events: auto;
    }

    .modal-close-btn:hover { 
        color: var(--primary); 
        transform: rotate(90deg);
        border-color: var(--primary);
    }

    @media (max-width: 768px) {
        .nav-buttons-vertical {
            display: none;
        }
        
        .profile-circle {
            top: calc(50% + 85px);
            right: 15px;
            width: 60px;
            height: 60px;
        }
        
        .profile-circle i {
            font-size: 2.5rem;
        }
        
        .username-container {
            top: calc(50% + 85px + 70px);
            right: 15px;
            padding: 6px 12px;
        }
        
        .username {
