<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>طلب خدمة</title>
    <link href="/static/css/ialogin.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>طلب خدمة: {{ service_name }}</h1>
        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">إرسال الطلب</button>
        </form>
        <p><a href="/">العودة إلى الصفحة الرئيسية</a></p>
    </div>
</body>
</html>
