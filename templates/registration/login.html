<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - ريكس</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FFBD59;
            --primary-dark: #E6A84A;
            --primary-light: rgba(255, 189, 89, 0.1);
            --bg: #1a1a1a;
            --bg-light: #252525;
            --bg-card: #2a2a2a;
            --text: #fff;
            --text-muted: #999;
            --text-light: #ccc;
            --border: #333;
            --border-light: #404040;
            --error: #E74C3C;
            --error-light: rgba(231, 76, 60, 0.1);
            --success: #4CAF50;
            --success-light: rgba(76, 175, 80, 0.1);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            --shadow-sm: 0 5px 15px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 20px rgba(255, 189, 89, 0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1f1f1f 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 189, 89, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(255, 189, 89, 0.03) 0%, transparent 30%);
            pointer-events: none;
            z-index: -1;
        }

        /* أنميشنات */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-up { animation: fadeIn 0.6s ease forwards; }
        .animate-scale { animation: scaleIn 0.5s ease forwards; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }

        /* ===== الناف بار ===== */
        nav {
            background: rgba(26, 26, 26, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 189, 89, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 0.8rem 0;
            animation: fadeIn 0.8s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--primary);
            font-weight: 800;
            font-size: 1.8rem;
            border: 2px solid var(--primary);
            padding: 0.3rem 1rem;
            border-radius: 12px 4px 12px 4px;
            text-decoration: none;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .logo:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow-glow);
        }

        .nav-menu {
            display: flex;
            gap: 1.5rem;
            list-style: none;
            align-items: center;
        }

        .nav-menu a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .nav-menu a:hover {
            color: var(--primary);
            background: rgba(255, 189, 89, 0.1);
        }

        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .nav-toggle:hover {
            transform: rotate(90deg);
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(26, 26, 26, 0.98);
                border-top: 2px solid rgba(255,189,89,0.2);
                padding: 1rem;
                flex-direction: column;
                align-items: stretch;
            }
            .nav-menu.active {
                display: flex;
                animation: slideInRight 0.3s ease;
            }
            .nav-toggle {
                display: block;
            }
        }

        /* ===== حاوية تسجيل الدخول ===== */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 1rem 2rem;
        }

        .auth-container {
            background: linear-gradient(145deg, var(--bg-card), #222);
            border: 1px solid rgba(255, 189, 89, 0.2);
            border-radius: 30px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow);
            animation: scaleIn 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: slideInRight 2s infinite;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .auth-header h2 i {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* ===== الرسائل ===== */
        .messages-container {
            margin-bottom: 2rem;
        }

        .message {
            padding: 1rem 1.5rem;
            border-radius: 15px;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideInRight 0.3s ease;
            font-weight: 500;
        }

        .message i {
            font-size: 1.2rem;
        }

        .message.error {
            background: var(--error-light);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #ff6b6b;
        }

        .message.success {
            background: var(--success-light);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #81c784;
        }

        /* ===== الفورم ===== */
        .form-group {
            margin-bottom: 1.8rem;
            animation: fadeIn 0.5s ease backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
        }

        label i {
            color: var(--primary);
            font-size: 1rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            right: 1rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 1rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 15px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 189, 89, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .input-wrapper:focus-within i {
            color: var(--primary);
        }

        /* ===== زر الدخول ===== */
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #000;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease 0.3s backwards;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 189, 89, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn i {
            font-size: 1.2rem;
        }

        /* ===== الروابط السفلية ===== */
        .auth-footer {
            margin-top: 2.5rem;
            text-align: center;
            animation: fadeIn 0.5s ease 0.4s backwards;
        }

        .auth-footer p {
            color: var(--text-muted);
            margin-bottom: 0.8rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.5rem;
            border: 1px solid rgba(255, 189, 89, 0.3);
            border-radius: 30px;
        }

        .auth-footer a:hover {
            background: rgba(255, 189, 89, 0.1);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .auth-footer a i {
            font-size: 0.9rem;
        }

        /* ===== خيارات إضافية ===== */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            color: var(--text-muted);
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        .forgot-password {
            text-align: center;
            margin-top: 1rem;
        }

        .forgot-password a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: var(--primary);
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .auth-wrapper {
                padding: 5rem 1rem 1rem;
            }

            .auth-container {
                padding: 2rem 1.5rem;
            }

            .auth-header h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 1.8rem 1.2rem;
            }

            .btn {
                padding: 0.9rem;
                font-size: 1rem;
            }
        }

        /* ===== سكرول مخصص ===== */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <!-- ===== الناف بار ===== -->
    <nav>
        <div class="container">
            <a href="{% url 'services:home' %}" class="logo">REX</a>
            
            <ul class="nav-menu" id="navMenu">
                <li><a href="{% url 'services:home' %}"><i class="fas fa-home"></i> الرئيسية</a></li>
                <li><a href="{% url 'services:home' %}#services"><i class="fas fa-star"></i> الخدمات</a></li>
            </ul>
            
            <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <!-- ===== حاوية تسجيل الدخول ===== -->
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <i class="fas fa-crown fa-3x" style="color: var(--primary); animation: float 3s ease-in-out infinite;"></i>
                <h2>
                    <i class="fas fa-lock"></i>
                    تسجيل الدخول
                </h2>
                <p>أهلاً بعودتك! يلا ندخل ونبدأ</p>
            </div>
            
            {% if messages %}
            <div class="messages-container">
                {% for message in messages %}
                    <div class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                        <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        اسم المستخدم
                    </label>
                    <div class="input-wrapper">
                        <input type="text" name="username" id="username" placeholder="أدخل اسم المستخدم" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        كلمة المرور
                    </label>
                    <div class="input-wrapper">
                        <input type="password" name="password" id="password" placeholder="أدخل كلمة المرور" required>
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="#">
                        <i class="fas fa-question-circle"></i>
                        نسيت كلمة المرور؟
                    </a>
                </div>

                <button type="submit" class="btn">
                    <i class="fas fa-sign-in-alt"></i>
                    دخول
                </button>
            </form>

            <div class="auth-divider">
                <span>أو</span>
            </div>

            <div class="auth-footer">
                <p>ما عندك حساب؟</p>
                <a href="{% url 'services:signup' %}">
                    <i class="fas fa-user-plus"></i>
                    إنشاء حساب جديد
                </a>
            </div>
        </div>
    </div>

    <script>
        // ===== وظائف الناف بار =====
        const navToggle = document.getElementById('navToggle');
        const navMenu = document.getElementById('navMenu');

        if (navToggle) {
            navToggle.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });

            // إغلاق القائمة عند النقر على رابط
            navMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navMenu.classList.remove('active');
                });
            });
        }

        // ===== تحسين تجربة المستخدم في الفورم =====
        const inputs = document.querySelectorAll('input[type="text"], input[type="password"]');
        
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateX(5px)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateX(0)';
            });
        });

        // ===== تأثيرات إضافية =====
        document.addEventListener('DOMContentLoaded', function() {
            // إضافة تأثير ظهور متأخر للعناصر
            const elements = document.querySelectorAll('.form-group, .btn, .auth-footer');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.style.transition = 'opacity 0.5s ease';
                    el.style.opacity = '1';
                }, 100 + (index * 100));
            });
        });
    </script>
</body>
</html>
